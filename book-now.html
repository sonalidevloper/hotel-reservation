<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now - HBS</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="booking-page">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="home.html" class="navbar-logo">
                <img src="./assets/logo.png" alt="Hotel Logo" />
            </a>

            <ul class="navbar-menu">
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="rooms.html" class="active">Rooms</a></li>
                <li><a href="contact-us.html">Contact Us</a></li>
                <li><a id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="booking-hero">
        <h1>Book Your Stay</h1>
        <p>Experience luxury, comfort & unforgettable memories</p>
    </section>

    <!-- Booking Form -->
    <div class="booking-container">
        <div class="booking-header">
            <h1>Reservation Details</h1>
        </div>

        <form class="booking-form" id="bookingForm">

            <label>Room Type:</label>
            <select id="room">
                <option data-price="800">Standard Room - ₹800 / night</option>
                <option data-price="1200">Deluxe Room - ₹1200 / night</option>
                <option data-price="2000">Suite Room - ₹2000 / night</option>
            </select>

            <label>Bed Type:</label>
            <select id="bed">
                <option>Single Bed</option>
                <option>Double Bed</option>
            </select>

            <label>Full Name:</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Email:</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Check-in Date:</label>
            <input type="date" id="checkin" required>

            <label>Check-out Date:</label>
            <input type="date" id="checkout" required>

            <div id="paymentDetails" class="payment-details" style="display:none;"></div>

            <button type="submit">Confirm Booking</button>

        </form>
    </div>

    <!-- Footer -->
    <footer class="footer">
        © 2024 Hotel Booking. All Rights Reserved.
    </footer>

    <script src="index.js"></script>

</body>
</html>
